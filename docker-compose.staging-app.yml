# ==============================================================================
# EMSIST - Staging Environment: APP TIER
#
# Contains application services (Keycloak, backend microservices, frontend).
# Networks are referenced as external (owned by the data tier).
#
# Lifecycle:
#   This file can be torn down independently of the data tier.
#   `docker compose -f docker-compose.staging-app.yml down` will NOT remove
#   data volumes or networks because they are defined in docker-compose.staging-data.yml.
#
# Prerequisites:
#   Data tier MUST be running first:
#     docker compose -f docker-compose.staging-data.yml --env-file .env.staging up -d
#
# Usage:
#   docker compose -f docker-compose.staging-app.yml --env-file .env.staging up --build -d
#   docker compose -f docker-compose.staging-app.yml --env-file .env.staging down
#   docker compose -f docker-compose.staging-app.yml --env-file .env.staging logs -f
# ==============================================================================

services:
  # ============================================================================
  # IDENTITY & SUPPORTING SERVICES
  # ============================================================================

  # ---------- Keycloak (Identity Provider) ----------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-staging_keycloak_admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: kc_db_user
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      JAVA_OPTS_KC_HEAP: "-Xms128m -Xmx512m"
    ports:
      - "8180:8080"
    volumes:
      - ./infrastructure/keycloak/realms:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if timeout 5 grep -q '\"UP\"' <&3; then exit 0; else exit 1; fi"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - ems-staging-backend
      - ems-staging-data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ---------- Keycloak Init (one-shot sidecar) ----------
  keycloak-init:
    build:
      context: ./infrastructure/keycloak
      dockerfile: Dockerfile
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-staging_keycloak_admin}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-ems-auth-facade-secret}
      SERVICE_CLIENT_ID: ${SERVICE_CLIENT_ID:-ems-auth-facade}
      SERVICE_CLIENT_SECRET: ${SERVICE_CLIENT_SECRET:-ems-auth-facade-secret}
      SERVICE_TOKEN_SCOPE: ${SERVICE_TOKEN_SCOPE:-internal.service}
      SERVICE_TOKEN_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/token
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-https://ems.example}
      API_GATEWAY_PUBLIC_URL: ${API_GATEWAY_PUBLIC_URL:-https://gateway.ems.example}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-staging_superadmin}
      SUPERADMIN_TEMP_PASSWORD: ${SUPERADMIN_TEMP_PASSWORD:-true}
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"
    networks:
      - ems-staging-backend
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

  # ---------- MailHog (SMTP for notification-service) ----------
  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - ems-staging-backend

  # ---------- Service Registry (Eureka) ----------
  eureka:
    build:
      context: ./backend/eureka-server
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - ems-staging-backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ============================================================================
  # BACKEND MICROSERVICES
  # ============================================================================

  # ---------- Auth Facade (8081) ----------
  auth-facade:
    build:
      context: ./backend
      dockerfile: auth-facade/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_ENABLED: "true"
      EUREKA_URL: http://eureka:8761/eureka
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/certs
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-ems-auth-facade-secret}
      SERVICE_CLIENT_ID: ${SERVICE_CLIENT_ID:-ems-auth-facade}
      SERVICE_CLIENT_SECRET: ${SERVICE_CLIENT_SECRET:-ems-auth-facade-secret}
      SERVICE_TOKEN_SCOPE: ${SERVICE_TOKEN_SCOPE:-internal.service}
      SERVICE_TOKEN_URL: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/token
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-staging_keycloak_admin}
      VALKEY_HOST: valkey
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-staging_neo4j_password}
      KAFKA_SERVERS: ${KAFKA_SERVERS:-kafka:29092}
      JASYPT_PASSWORD: ${JASYPT_PASSWORD:-staging_jasypt_secret_change_me}
    depends_on:
      eureka:
        condition: service_healthy
      keycloak-init:
        condition: service_completed_successfully
    networks:
      - ems-staging-backend
      - ems-staging-data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ---------- Tenant Service (8082) ----------
  tenant-service:
    build:
      context: ./backend
      dockerfile: tenant-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_ENABLED: "true"
      EUREKA_URL: http://eureka:8761/eureka
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "3"
      DATABASE_URL: jdbc:postgresql://postgres:5432/master_db
      DATABASE_USER: svc_tenant
      DATABASE_PASSWORD: ${SVC_TENANT_PASSWORD}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-staging_keycloak_admin}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/certs
      KAFKA_SERVERS: ${KAFKA_SERVERS:-kafka:29092}
    depends_on:
      eureka:
        condition: service_healthy
      keycloak-init:
        condition: service_completed_successfully
    networks:
      - ems-staging-backend
      - ems-staging-data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ---------- User Service (8083) ----------
  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_ENABLED: "true"
      EUREKA_URL: http://eureka:8761/eureka
      DATABASE_URL: jdbc:postgresql://postgres:5432/user_db
      DATABASE_USER: svc_user
      DATABASE_PASSWORD: ${SVC_USER_PASSWORD}
      VALKEY_HOST: valkey
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-staging_keycloak_admin}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/certs
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - ems-staging-backend
      - ems-staging-data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ---------- License Service (8085) ----------
  license-service:
    build:
      context: ./backend
      dockerfile: license-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_ENABLED: "true"
      EUREKA_URL: http://eureka:8761/eureka
      DATABASE_URL: jdbc:postgresql://postgres:5432/license_db
      DATABASE_USER: svc_license
      DATABASE_PASSWORD: ${SVC_LICENSE_PASSWORD}
      VALKEY_HOST: valkey
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/certs
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - ems-staging-backend
      - ems-staging-data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ---------- Notification Service (8086) ----------
  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_ENABLED: "true"
      EUREKA_URL: http://eureka:8761/eureka
      DATABASE_URL: jdbc:postgresql://postgres:5432/notification_db
      DATABASE_USER: svc_notify
      DATABASE_PASSWORD: ${SVC_NOTIFICATION_PASSWORD}
      VALKEY_HOST: valkey
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_SERVERS:-kafka:29092}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/certs
    depends_on:
      eureka:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - ems-staging-backend
      - ems-staging-data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ---------- Audit Service (8087) ----------
  audit-service:
    build:
      context: ./backend
      dockerfile: audit-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_ENABLED: "true"
      EUREKA_URL: http://eureka:8761/eureka
      DATABASE_URL: jdbc:postgresql://postgres:5432/audit_db
      DATABASE_USER: svc_audit
      DATABASE_PASSWORD: ${SVC_AUDIT_PASSWORD}
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_SERVERS:-kafka:29092}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/certs
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - ems-staging-backend
      - ems-staging-data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ---------- AI Service (8088) ----------
  ai-service:
    build:
      context: ./backend
      dockerfile: ai-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_ENABLED: "true"
      EUREKA_URL: http://eureka:8761/eureka
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ai_db
      DB_USERNAME: svc_ai
      DB_PASSWORD: ${SVC_AI_PASSWORD}
      VALKEY_HOST: valkey
      KAFKA_SERVERS: ${KAFKA_SERVERS:-kafka:29092}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/certs
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - ems-staging-backend
      - ems-staging-data
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"

  # ---------- Definition Service (8090) ----------
  definition-service:
    build:
      context: ./backend
      dockerfile: definition-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_ENABLED: "true"
      EUREKA_URL: http://eureka:8761/eureka
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-master}/protocol/openid-connect/certs
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-staging_neo4j_password}
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - ems-staging-backend
      - ems-staging-data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ---------- API Gateway (8080) ----------
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_ENABLED: "true"
      EUREKA_URL: http://eureka:8761/eureka
      VALKEY_HOST: valkey
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - ems-staging-frontend
      - ems-staging-backend
      - ems-staging-data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ============================================================================
  # FRONTEND
  # ============================================================================

  # ---------- Frontend (Angular + nginx) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - ems-staging-frontend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

# ==============================================================================
# NETWORKS
# All networks are owned by the data tier (docker-compose.staging-data.yml).
# Referenced as external here so that `docker compose -f app.yml down`
# cannot accidentally remove networks that data services depend on.
# ==============================================================================
networks:
  ems-staging-data:
    external: true
  ems-staging-backend:
    external: true
  ems-staging-frontend:
    external: true
