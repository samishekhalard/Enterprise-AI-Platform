<app-page-frame
  [title]="'Access Denied'"
  [subtitle]="'You do not have permission to access this resource.'"
>
  <section page-content>
    <section class="app-panel error-panel">
      <p>If you need access, please contact your administrator.</p>
      <div class="actions">
        <button type="button" pButton severity="secondary" (click)="goBack()">Go Back</button>
        <a routerLink="/administration" pButton severity="secondary">Go to Administration</a>
      </div>
    </section>
  </section>

  <p page-footer>Authorization failure page migrated from legacy frontend.</p>
</app-page-frame>
