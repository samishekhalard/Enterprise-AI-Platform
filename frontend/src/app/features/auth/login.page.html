<div class="login-page">
  <div class="background-pattern" aria-hidden="true"></div>

  <main class="login-content">
    <a routerLink="/dashboard" class="welcome-logo-link" aria-label="ThinkPLUS Home">
      @if (!logoLoadFailed()) {
        <img
          src="/assets/images/logo.png"
          alt="ThinkPLUS"
          class="welcome-logo"
          (error)="onLogoLoadError()"
        />
      } @else {
        <span class="welcome-logo-fallback" aria-label="ThinkPLUS">think+</span>
      }
    </a>

    <h1 class="welcome-title">Welcome to {{ tenantName }}</h1>
    <p class="welcome-subtitle">Empower. Transform. Succeed.</p>

    @if (info()) {
      <section class="info-banner" role="status">{{ info() }}</section>
    }

    @if (error()) {
      <section class="error-banner" role="alert">{{ error() }}</section>
    }

    @if (!showLoginForm()) {
      <div class="signin-section">
        <button type="button" class="signin-btn" (click)="openEmailSignIn()">
          <svg
            class="btn-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="5" width="18" height="14" rx="2"></rect>
            <polyline points="3,7 12,13 21,7"></polyline>
          </svg>
          Sign in with Email
        </button>

        <p class="help-text">
          Having trouble signing in?
          <a href="mailto:support@thinkplus.ae">Contact support</a>
        </p>
      </div>
    } @else {
      <div class="signin-card-stage">
        <form class="login-form" (ngSubmit)="onSubmit()" novalidate>
          <div class="neo-field">
            <label class="neo-field-label" for="identifier">Email or Username</label>
            <div class="neo-input-wrap">
              <input
                id="identifier"
                class="neo-input"
                type="text"
                name="identifier"
                [(ngModel)]="identifier"
                autocomplete="username"
                required
                placeholder="Enter your username"
              />
              <span class="neo-icon" aria-hidden="true">
                <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M256 0c-74.439 0-135 60.561-135 135s60.561 135 135 135 135-60.561 135-135S330.439 0 256 0zM423.966 358.195C387.006 320.667 338.009 300 286 300h-60c-52.008 0-101.006 20.667-137.966 58.195C51.255 395.539 31 444.833 31 497c0 8.284 6.716 15 15 15h420c8.284 0 15-6.716 15-15 0-52.167-20.255-101.461-57.034-138.805z"
                  />
                </svg>
              </span>
            </div>
          </div>

          <div class="neo-field">
            <label class="neo-field-label" for="password">Password</label>
            <div class="neo-input-wrap">
              <input
                id="password"
                class="neo-input neo-input-password"
                [type]="showPassword() ? 'text' : 'password'"
                name="password"
                [(ngModel)]="password"
                autocomplete="current-password"
                required
                placeholder="Enter your password"
              />
              <span class="neo-icon" aria-hidden="true">
                <svg viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M336 192h-16v-64C320 57.406 262.594 0 192 0S64 57.406 64 128v64H48c-26.453 0-48 21.523-48 48v224c0 26.477 21.547 48 48 48h288c26.453 0 48-21.523 48-48V240c0-26.477-21.547-48-48-48zm-229.332-64c0-47.063 38.27-85.332 85.332-85.332s85.332 38.27 85.332 85.332v64H106.668z"
                  />
                </svg>
              </span>
              <button
                type="button"
                class="password-toggle"
                [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
                [attr.title]="showPassword() ? 'Hide password' : 'Show password'"
                (click)="togglePasswordVisibility()"
              >
                @if (showPassword()) {
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    aria-hidden="true"
                  >
                    <path d="M3 3l18 18"></path>
                    <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path>
                    <path
                      d="M9.9 5.1A10.7 10.7 0 0 1 12 5c5 0 9 3.7 10 7-0.4 1.4-1.4 3-2.9 4.3"
                    ></path>
                    <path
                      d="M6.3 6.3C4.6 7.5 3.4 9.2 2 12c1 3.3 5 7 10 7 1.7 0 3.2-0.4 4.6-1.1"
                    ></path>
                  </svg>
                } @else {
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    aria-hidden="true"
                  >
                    <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                }
              </button>
            </div>
          </div>

          <div class="neo-field">
            <label class="neo-field-label" for="tenant-id">Tenant ID</label>
            <div class="neo-input-wrap">
              <input
                id="tenant-id"
                class="neo-input"
                type="text"
                name="tenantId"
                [(ngModel)]="tenantId"
                required
                placeholder="Enter tenant ID"
              />
              <span class="neo-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 3l8 6v10a2 2 0 0 1-2 2h-4v-6h-4v6H6a2 2 0 0 1-2-2V9l8-6z" />
                </svg>
              </span>
            </div>
          </div>

          <button type="submit" class="submit-btn" [disabled]="loading()">
            {{ loading() ? 'Signing in...' : 'Sign In' }}
          </button>

          <button type="button" class="back-btn" (click)="closeEmailSignIn()">
            <svg
              class="btn-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <path d="M15 18l-6-6 6-6"></path>
            </svg>
            Back
          </button>
        </form>

        <p class="help-text help-text-below-card">
          Having trouble signing in?
          <a href="mailto:support@thinkplus.ae">Contact support</a>
        </p>
      </div>
    }
  </main>
</div>
