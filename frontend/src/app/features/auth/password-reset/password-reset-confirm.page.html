<app-page-frame [title]="'Set New Password'" [subtitle]="'Create a new password for your account.'">
  <section page-content>
    @if (success()) {
      <section class="app-panel success-panel">
        <h3>Password Reset Successfully</h3>
        <p>Your password has been updated. You can now sign in with the new password.</p>
        <a routerLink="/auth/login" class="app-btn app-btn-primary">Sign In</a>
      </section>
    } @else {
      <form class="app-panel confirm-form" (ngSubmit)="submit()">
        <label>
          <span>New password</span>
          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            autocomplete="new-password"
            required
          />
        </label>

        <label>
          <span>Confirm password</span>
          <input
            type="password"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            autocomplete="new-password"
            required
          />
        </label>

        @if (error()) {
          <div class="app-alert app-alert-error">{{ error() }}</div>
        }

        <button type="submit" class="app-btn app-btn-primary" [disabled]="loading() || !canSubmit">
          {{ loading() ? 'Resetting...' : 'Reset Password' }}
        </button>
      </form>
    }
  </section>

  <div page-footer>
    <a routerLink="/auth/login" class="footer-link">Return to sign in</a>
  </div>
</app-page-frame>
