<app-page-frame
  [title]="'Reset Password'"
  [subtitle]="'Request a secure reset link for your account.'"
>
  <section page-content>
    @if (!submitted()) {
      <form class="app-panel request-form" (ngSubmit)="submit()">
        <label>
          <span>Email address</span>
          <input
            pInputText
            type="email"
            name="email"
            [(ngModel)]="email"
            autocomplete="email"
            placeholder="name@company.com"
            required
          />
        </label>

        @if (error()) {
          <div class="app-alert app-alert-error">{{ error() }}</div>
        }

        <button type="submit" pButton [disabled]="loading() || !email.trim()">
          {{ loading() ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </form>
    } @else {
      <section class="app-panel success-panel">
        <h3>Check Your Email</h3>
        <p>
          If an account exists for <strong>{{ email }}</strong
          >, a reset link has been sent.
        </p>
        <div class="actions">
          <button type="button" pButton severity="secondary" (click)="retry()">
            Try Another Email
          </button>
          <a routerLink="/auth/login" pButton severity="secondary">Back to Sign In</a>
        </div>
      </section>
    }
  </section>

  <div page-footer>
    <a routerLink="/auth/login" class="footer-link">Return to sign in</a>
  </div>
</app-page-frame>
