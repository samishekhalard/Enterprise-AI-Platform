@if (!appReady()) {
  <section class="app-splash" role="status" aria-live="polite" aria-label="Loading application">
    <img src="assets/images/logo.svg" alt="" class="app-splash-logo" />
    <p class="app-splash-text">Loading ThinkPLUS...</p>
  </section>
} @else if (useShellLayout()) {
  <app-shell-layout
    [title]="'ThinkPLUS Enterprise Suite'"
    [subtitle]="'Branded shell with staged module migration'"
    [navItems]="navItems"
    [authenticated]="isAuthenticated()"
    [footerText]="'Container governance enabled: header, content, and footer layout contract active.'"
    (logout)="onLogout()"
  >
    <app-notification-bell shell-header-actions />

    <section shell-content>
      <router-outlet />
    </section>

    <div shell-footer>
      <small>Versioned module migration in progress.</small>
    </div>
  </app-shell-layout>
} @else {
  <router-outlet />
}
