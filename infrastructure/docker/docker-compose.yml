services:
  # ============================================================================
  # DATABASES
  # ============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: ems-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ems-network

  valkey:
    image: valkey/valkey:8-alpine
    container_name: ems-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ems-network

  neo4j:
    image: neo4j:5.12.0-community
    container_name: ems-neo4j
    ports:
      - "7474:7474"  # HTTP Browser
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ems-network

  # ============================================================================
  # MESSAGING
  # ============================================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ems-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ems-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ems-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - ems-network

  # ============================================================================
  # IDENTITY
  # ============================================================================

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ems-keycloak
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    volumes:
      - ../keycloak/realms:/opt/keycloak/data/import:ro
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if timeout 5 grep -q '\"UP\"' <&3; then exit 0; else exit 1; fi"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - ems-network

  # ============================================================================
  # KEYCLOAK INIT (one-shot sidecar)
  # ============================================================================

  keycloak-init:
    build:
      context: ../../infrastructure/keycloak
      dockerfile: Dockerfile
    container_name: ems-keycloak-init
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-ems-auth-facade-secret}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-https://ems.example}
      API_GATEWAY_PUBLIC_URL: ${API_GATEWAY_PUBLIC_URL:-https://gateway.ems.example}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-admin}
      SUPERADMIN_TEMP_PASSWORD: ${SUPERADMIN_TEMP_PASSWORD:-true}
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"
    networks:
      - ems-network

  # ============================================================================
  # SERVICE DISCOVERY
  # ============================================================================

  eureka:
    build:
      context: ../../backend/eureka-server
      dockerfile: Dockerfile
    container_name: ems-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - ems-network

  # ============================================================================
  # MICROSERVICES
  # ============================================================================

  api-gateway:
    build:
      context: ../../backend
      dockerfile: api-gateway/Dockerfile
    container_name: ems-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka:8761/eureka
    depends_on:
      eureka:
        condition: service_healthy
      auth-facade:
        condition: service_started
      tenant-service:
        condition: service_started
    networks:
      - ems-network

  auth-facade:
    build:
      context: ../../backend
      dockerfile: auth-facade/Dockerfile
    container_name: ems-auth-facade
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka:8761/eureka
      KEYCLOAK_URL: http://keycloak:8080
      VALKEY_HOST: valkey
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
    depends_on:
      eureka:
        condition: service_healthy
      keycloak-init:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - ems-network

  tenant-service:
    build:
      context: ../../backend
      dockerfile: tenant-service/Dockerfile
    container_name: ems-tenant-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka:8761/eureka
      DATABASE_URL: jdbc:postgresql://postgres:5432/master_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      KEYCLOAK_URL: http://keycloak:8080
      KAFKA_SERVERS: kafka:29092
    depends_on:
      eureka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      keycloak-init:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    networks:
      - ems-network

  user-service:
    build:
      context: ../../backend
      dockerfile: user-service/Dockerfile
    container_name: ems-user-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka:8761/eureka
      DATABASE_URL: jdbc:postgresql://postgres:5432/user_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      VALKEY_HOST: valkey
      KAFKA_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ems-network

  license-service:
    build:
      context: ../../backend
      dockerfile: license-service/Dockerfile
    container_name: ems-license-service
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka:8761/eureka
      DATABASE_URL: jdbc:postgresql://postgres:5432/license_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      VALKEY_HOST: valkey
      KAFKA_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ems-network

  notification-service:
    build:
      context: ../../backend
      dockerfile: notification-service/Dockerfile
    container_name: ems-notification-service
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka:8761/eureka
      DATABASE_URL: jdbc:postgresql://postgres:5432/notification_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      VALKEY_HOST: valkey
      KAFKA_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ems-network

  audit-service:
    build:
      context: ../../backend
      dockerfile: audit-service/Dockerfile
    container_name: ems-audit-service
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka:8761/eureka
      DATABASE_URL: jdbc:postgresql://postgres:5432/audit_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      VALKEY_HOST: valkey
      KAFKA_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ems-network

  ai-service:
    build:
      context: ../../backend
      dockerfile: ai-service/Dockerfile
    container_name: ems-ai-service
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka:8761/eureka
      DATABASE_URL: jdbc:postgresql://postgres:5432/ai_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      VALKEY_HOST: valkey
      KAFKA_SERVERS: kafka:29092
      # AI/LLM configuration - set via environment or secrets
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ems-network

  # ============================================================================
  # MONITORING
  # ============================================================================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ems-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ems-network

  grafana:
    image: grafana/grafana:10.2.2
    container_name: ems-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ems-network

networks:
  ems-network:
    driver: bridge

volumes:
  postgres_data:
  valkey_data:
  neo4j_data:
  neo4j_logs:
  prometheus_data:
  grafana_data:
