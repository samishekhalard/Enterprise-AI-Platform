name: API Contract Security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  openapi-governance:
    name: OpenAPI Governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Transport-security governance
        run: ./scripts/check-transport-security-baseline.sh

      - name: Spectral lint
        run: |
          npx --yes @stoplight/spectral-cli@6.13.1 lint \
            --ruleset .spectral.yaml \
            backend/*/openapi.yaml

      - name: Fetch base branch
        run: git fetch origin main --depth=1

      - name: OpenAPI breaking-change check
        run: ./scripts/check-openapi-breaking.sh origin/main

  gateway-security-contracts:
    name: Gateway Security Contracts
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: emsist-ci-security
      CONTRACT_BASE_URL: http://localhost:28080
      CONTRACT_TENANT_ID: 00000000-0000-0000-0000-000000000001
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: contracts/package-lock.json

      - name: Install contract test dependencies
        working-directory: contracts
        run: npm ci

      - name: Build and start gateway stack
        run: docker compose -f docker-compose.dev.yml up -d --build valkey api-gateway

      - name: Wait for API Gateway health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:28080/actuator/health > /dev/null; then
              echo "Gateway is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Gateway did not become healthy in time"
          docker compose -f docker-compose.dev.yml logs api-gateway
          exit 1

      - name: Run gateway security contract tests
        working-directory: contracts
        run: npm test

      - name: Shutdown gateway stack
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v
