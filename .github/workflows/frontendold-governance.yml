name: Frontendold Governance

on:
  pull_request:
    paths:
      - "frontendold/**"
      - "docs/wireframes/mobile-tenant-auth-providers.html"
      - "docs/lld/auth-facade-lld.md"
      - "scripts/custom-css-audit.sh"
      - "scripts/custom-css-allowlist.txt"
      - ".github/workflows/frontendold-governance.yml"
  push:
    branches:
      - main
    paths:
      - "frontendold/**"
      - "docs/wireframes/mobile-tenant-auth-providers.html"
      - "docs/lld/auth-facade-lld.md"
      - "scripts/custom-css-audit.sh"
      - "scripts/custom-css-allowlist.txt"
      - ".github/workflows/frontendold-governance.yml"
  schedule:
    - cron: "0 6 * * 1"
    - cron: "0 6 1 * *"
  workflow_dispatch:

jobs:
  custom-css-governance-legacy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run custom CSS audit
        id: custom_css_audit
        run: bash scripts/custom-css-audit.sh frontendold/test-results
        continue-on-error: true

      - name: Upload custom CSS audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custom-css-audit-frontendold
          path: |
            frontendold/test-results/custom-css-audit.json
            frontendold/test-results/custom-css-audit.md

      - name: Enforce governance gate
        if: steps.custom_css_audit.outcome == 'failure'
        run: |
          echo "Frontend governance gate failed. Review custom CSS audit artifacts."
          exit 1
