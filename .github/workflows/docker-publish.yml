# ==============================================================================
# EMSIST - Docker Build & Publish to Docker Hub
#
# Registry: docker.io/thinkplusae/emsist
# Tag format: thinkplusae/emsist:<service>-<version>
#
# Triggers:
#   - Push to main branch  -> tag as "latest"
#   - Git tags v*           -> tag as version number (e.g., 1.2.0)
#   - Manual dispatch       -> tag with user-provided version
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME - Docker Hub username
#   DOCKERHUB_TOKEN    - Docker Hub access token (NOT password)
# ==============================================================================
name: Docker Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g., 1.2.0, rc-1)"
        required: true
        type: string
      platforms:
        description: "Target platforms"
        required: false
        type: choice
        options:
          - linux/amd64,linux/arm64
          - linux/amd64
        default: linux/amd64,linux/arm64

env:
  REGISTRY: docker.io
  IMAGE_BASE: thinkplusae/emsist

jobs:
  # ──────────────────────────────────────────────────────────────
  # Resolve the version tag from the trigger context
  # ──────────────────────────────────────────────────────────────
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      platforms: ${{ steps.version.outputs.platforms }}
    steps:
      - name: Determine version and platforms
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            PLATFORMS="${{ github.event.inputs.platforms }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Strip leading 'v' from tag (v1.2.0 -> 1.2.0)
            VERSION="${GITHUB_REF_NAME#v}"
            PLATFORMS="linux/amd64,linux/arm64"
          else
            VERSION="latest"
            PLATFORMS="linux/amd64,linux/arm64"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "platforms=${PLATFORMS}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"
          echo "Resolved platforms: ${PLATFORMS}"

  # ──────────────────────────────────────────────────────────────
  # Build and push backend services (matrix)
  # ──────────────────────────────────────────────────────────────
  publish-backend:
    name: "Publish: ${{ matrix.service }}"
    needs: [resolve-version]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - service: api-gateway
            context: backend
            dockerfile: backend/api-gateway/Dockerfile
          - service: auth-facade
            context: backend
            dockerfile: backend/auth-facade/Dockerfile
          - service: tenant-service
            context: backend
            dockerfile: backend/tenant-service/Dockerfile
          - service: user-service
            context: backend
            dockerfile: backend/user-service/Dockerfile
          - service: license-service
            context: backend
            dockerfile: backend/license-service/Dockerfile
          - service: notification-service
            context: backend
            dockerfile: backend/notification-service/Dockerfile
          - service: audit-service
            context: backend
            dockerfile: backend/audit-service/Dockerfile
          - service: ai-service
            context: backend
            dockerfile: backend/ai-service/Dockerfile
          - service: process-service
            context: backend
            dockerfile: backend/process-service/Dockerfile
          - service: definition-service
            context: backend
            dockerfile: backend/definition-service/Dockerfile
          - service: eureka-server
            context: backend/eureka-server
            dockerfile: backend/eureka-server/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            type=raw,value=${{ matrix.service }}-${{ needs.resolve-version.outputs.version }}
            type=raw,value=${{ matrix.service }}-latest,enable=${{ needs.resolve-version.outputs.version != 'latest' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ needs.resolve-version.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ──────────────────────────────────────────────────────────────
  # Build and push frontend
  # ──────────────────────────────────────────────────────────────
  publish-frontend:
    name: "Publish: frontend"
    needs: [resolve-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            type=raw,value=frontend-${{ needs.resolve-version.outputs.version }}
            type=raw,value=frontend-latest,enable=${{ needs.resolve-version.outputs.version != 'latest' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: ${{ needs.resolve-version.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ──────────────────────────────────────────────────────────────
  # Build and push keycloak-init
  # ──────────────────────────────────────────────────────────────
  publish-keycloak-init:
    name: "Publish: keycloak-init"
    needs: [resolve-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            type=raw,value=keycloak-init-${{ needs.resolve-version.outputs.version }}
            type=raw,value=keycloak-init-latest,enable=${{ needs.resolve-version.outputs.version != 'latest' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: infrastructure/keycloak
          file: infrastructure/keycloak/Dockerfile
          platforms: ${{ needs.resolve-version.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=keycloak-init
          cache-to: type=gha,mode=max,scope=keycloak-init

  # ──────────────────────────────────────────────────────────────
  # Post-publish summary
  # ──────────────────────────────────────────────────────────────
  publish-summary:
    name: Publish Summary
    needs: [resolve-version, publish-backend, publish-frontend, publish-keycloak-init]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          echo "============================================"
          echo "  EMSIST Docker Publish Summary"
          echo "============================================"
          echo ""
          echo "Version: ${VERSION}"
          echo "Registry: docker.io/thinkplusae/emsist"
          echo ""
          echo "Backend services: ${{ needs.publish-backend.result }}"
          echo "Frontend:         ${{ needs.publish-frontend.result }}"
          echo "Keycloak Init:    ${{ needs.publish-keycloak-init.result }}"
          echo ""
          echo "Images published:"
          for svc in api-gateway auth-facade tenant-service user-service \
                     license-service notification-service audit-service \
                     ai-service process-service definition-service eureka-server \
                     frontend keycloak-init; do
            echo "  thinkplusae/emsist:${svc}-${VERSION}"
          done

      - name: Fail if any publish failed
        if: |
          needs.publish-backend.result != 'success' ||
          needs.publish-frontend.result != 'success' ||
          needs.publish-keycloak-init.result != 'success'
        run: |
          echo "One or more publish jobs failed."
          exit 1
