name: Branch Preview & Test

on:
  push:
    branches-ignore:
      - main

jobs:
  test-and-preview:
    name: Test & Deploy Preview
    runs-on: self-hosted
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Unit tests
        working-directory: frontend
        run: npm run test

      - name: Build (production)
        working-directory: frontend
        run: npm run build

      - name: Deploy preview
        id: deploy_preview
        if: success()
        continue-on-error: true
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          echo "Deploying preview for branch: $BRANCH"
          bash C:/ci-pipeline/preview/deploy-preview.sh "$BRANCH"

      - name: Post preview URL
        if: steps.deploy_preview.outcome == 'success'
        run: |
          echo "## Preview Deployed" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${GITHUB_REF_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "URL: http://localhost:9200" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View the [CI Dashboard](http://localhost:9000) for details." >> $GITHUB_STEP_SUMMARY

      - name: Report preview warning
        if: steps.deploy_preview.outcome == 'failure'
        run: |
          echo "## Preview Deployment Warning" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${GITHUB_REF_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "Preview deployment failed on the self-hosted runner, but lint, typecheck, unit tests, and build completed." >> $GITHUB_STEP_SUMMARY
          echo "Check the [CI Dashboard](http://localhost:9000) logs for details." >> $GITHUB_STEP_SUMMARY

      - name: Report failure
        if: failure() && steps.deploy_preview.outcome != 'failure'
        run: |
          echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${GITHUB_REF_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "Check the [CI Dashboard](http://localhost:9000) logs for details." >> $GITHUB_STEP_SUMMARY
