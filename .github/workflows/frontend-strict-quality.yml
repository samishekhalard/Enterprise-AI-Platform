name: Frontend Strict Quality

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-strict-quality.yml"

jobs:
  frontend-strict-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Layout contract
        run: ../scripts/check-frontend-layout-contract.sh frontend

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: E2E quality gates (browser matrix + visual + SEO)
        run: npm run e2e:quality

      - name: Build
        run: npm run build
