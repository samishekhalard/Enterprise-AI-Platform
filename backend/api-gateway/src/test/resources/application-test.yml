server:
  port: 0

spring:
  application:
    name: api-gateway-test
  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes: []
    discovery:
      client:
        health-indicator:
          enabled: false

  # Disable Valkey for tests
  data:
    redis:
      host: localhost
      port: 6379

# Disable Eureka for tests
eureka:
  client:
    enabled: false

# Disable Redis/Valkey health check in tests (not available in CI)
management:
  health:
    redis:
      enabled: false

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.ems.gateway: DEBUG
