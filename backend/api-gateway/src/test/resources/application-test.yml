server:
  port: 0

spring:
  application:
    name: api-gateway-test
  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes: []

  # Disable Valkey for tests
  data:
    redis:
      host: localhost
      port: 6379

# Disable Eureka for tests
eureka:
  client:
    enabled: false

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.ems.gateway: DEBUG
