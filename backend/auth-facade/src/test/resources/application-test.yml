server:
  port: 0

spring:
  application:
    name: auth-facade-test

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/master
          jwk-set-uri: http://localhost:8180/realms/master/protocol/openid-connect/certs

  data:
    redis:
      host: localhost
      port: 6379
    neo4j:
      uri: bolt://localhost:7687
      authentication:
        username: neo4j
        password: testpassword

# Use in-memory provider resolver for tests by default
auth:
  dynamic-broker:
    enabled: true
    storage: memory

# Jasypt for tests
jasypt:
  encryptor:
    password: test-encryption-key
    algorithm: PBEWithMD5AndDES

keycloak:
  server-url: http://localhost:8180
  admin:
    username: admin
    password: admin
  client:
    client-id: test-client
    client-secret: test-secret

eureka:
  client:
    enabled: false

rate-limit:
  requests-per-minute: 1000

token:
  mfa-signing-key: test-signing-key-for-unit-tests-only-32-chars

logging:
  level:
    com.ems: DEBUG
