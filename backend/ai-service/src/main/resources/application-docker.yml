# Docker profile - uses container hostnames
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:ai_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  data:
    redis:
      host: ${VALKEY_HOST:valkey}
      port: 6379

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:kafka:29092}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka:8761/eureka}

logging:
  level:
    com.ems.ai: INFO
    org.hibernate.SQL: INFO
