server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: ai-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/master}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/master/protocol/openid-connect/certs}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ems}
    username: ${DB_USERNAME:ems}
    password: ${DB_PASSWORD:ems}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: ai_service_schema_history
    locations: classpath:db/migration

  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ai-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.ems.*

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# AI Provider Configuration
ai:
  providers:
    openai:
      enabled: ${OPENAI_ENABLED:true}
      api-key: ${OPENAI_API_KEY:}
      default-model: gpt-4o
      embedding-model: text-embedding-3-small
      base-url: https://api.openai.com/v1
      timeout: 60000

    anthropic:
      enabled: ${ANTHROPIC_ENABLED:true}
      api-key: ${ANTHROPIC_API_KEY:}
      default-model: claude-sonnet-4-20250514
      base-url: https://api.anthropic.com
      timeout: 60000

    gemini:
      enabled: ${GEMINI_ENABLED:false}
      api-key: ${GEMINI_API_KEY:}
      default-model: gemini-1.5-pro
      timeout: 60000

    ollama:
      enabled: ${OLLAMA_ENABLED:false}
      base-url: ${OLLAMA_URL:http://localhost:11434}
      default-model: llama3.2
      timeout: 120000

  # RAG Configuration
  rag:
    chunk-size: 1000
    chunk-overlap: 200
    max-chunks-per-query: 5
    similarity-threshold: 0.7
    embedding-dimension: 1536

  # Conversation Context
  conversation:
    max-context-messages: 20
    context-cache-ttl: 3600

# Eureka Configuration
eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# OpenAPI/Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Logging
logging:
  level:
    com.ems.ai: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
