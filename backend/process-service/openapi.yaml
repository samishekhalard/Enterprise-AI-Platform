openapi: 3.1.0
info:
  title: Process Service API
  description: API for BPMN process management and workflow execution
  version: 1.0.0
  contact:
    name: EMS Team

servers:
  - url: http://localhost:8089
    description: Development server

tags:
  - name: BPMN Element Types
    description: BPMN element type management
  - name: Process Definitions
    description: Process definition management
  - name: Process Instances
    description: Process instance execution

security:
  - bearerAuth: []

paths:
  /api/v1/bpmn/element-types:
    get:
      tags: [BPMN Element Types]
      summary: List BPMN element types
      operationId: listElementTypes
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: List of element types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BpmnElementType'

    post:
      tags: [BPMN Element Types]
      summary: Create BPMN element type
      operationId: createElementType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateElementTypeRequest'
      responses:
        '201':
          description: Element type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BpmnElementType'

  /api/v1/bpmn/element-types/{typeId}:
    get:
      tags: [BPMN Element Types]
      summary: Get element type by ID
      operationId: getElementType
      parameters:
        - name: typeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Element type details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BpmnElementType'
        '404':
          description: Element type not found

    put:
      tags: [BPMN Element Types]
      summary: Update element type
      operationId: updateElementType
      parameters:
        - name: typeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateElementTypeRequest'
      responses:
        '200':
          description: Element type updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BpmnElementType'

    delete:
      tags: [BPMN Element Types]
      summary: Delete element type
      operationId: deleteElementType
      parameters:
        - name: typeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Element type deleted

  /api/v1/workflows:
    get:
      tags: [Process Definitions]
      summary: List process definitions
      operationId: listProcessDefinitions
      parameters:
        - $ref: '#/components/parameters/XTenantID'
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of process definitions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessDefinitionPage'

    post:
      tags: [Process Definitions]
      summary: Create process definition
      operationId: createProcessDefinition
      parameters:
        - $ref: '#/components/parameters/XTenantID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProcessDefinitionRequest'
      responses:
        '201':
          description: Process definition created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessDefinition'

  /api/v1/workflows/{definitionId}:
    get:
      tags: [Process Definitions]
      summary: Get process definition by ID
      operationId: getProcessDefinition
      parameters:
        - $ref: '#/components/parameters/XTenantID'
        - name: definitionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Process definition details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessDefinition'

    put:
      tags: [Process Definitions]
      summary: Update process definition
      operationId: updateProcessDefinition
      parameters:
        - $ref: '#/components/parameters/XTenantID'
        - name: definitionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProcessDefinitionRequest'
      responses:
        '200':
          description: Process definition updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessDefinition'

    delete:
      tags: [Process Definitions]
      summary: Delete process definition
      operationId: deleteProcessDefinition
      parameters:
        - $ref: '#/components/parameters/XTenantID'
        - name: definitionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Process definition deleted

  /api/v1/workflows/{definitionId}/instances:
    get:
      tags: [Process Instances]
      summary: List process instances
      operationId: listProcessInstances
      parameters:
        - $ref: '#/components/parameters/XTenantID'
        - name: definitionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, COMPLETED, TERMINATED, SUSPENDED]
      responses:
        '200':
          description: List of process instances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProcessInstance'

    post:
      tags: [Process Instances]
      summary: Start process instance
      operationId: startProcessInstance
      parameters:
        - $ref: '#/components/parameters/XTenantID'
        - name: definitionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartProcessRequest'
      responses:
        '201':
          description: Process instance started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessInstance'

  /api/v1/workflows/instances/{instanceId}:
    get:
      tags: [Process Instances]
      summary: Get process instance by ID
      operationId: getProcessInstance
      parameters:
        - $ref: '#/components/parameters/XTenantID'
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Process instance details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessInstance'

  /api/v1/workflows/instances/{instanceId}/terminate:
    post:
      tags: [Process Instances]
      summary: Terminate process instance
      operationId: terminateProcessInstance
      parameters:
        - $ref: '#/components/parameters/XTenantID'
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Process instance terminated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessInstance'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    XTenantID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string

  schemas:
    BpmnElementType:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [EVENT, TASK, GATEWAY, SUBPROCESS, DATA, ARTIFACT]
        bpmnType:
          type: string
        icon:
          type: string
        color:
          type: string
        properties:
          type: object
        isActive:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    CreateElementTypeRequest:
      type: object
      required: [code, name, category, bpmnType]
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [EVENT, TASK, GATEWAY, SUBPROCESS, DATA, ARTIFACT]
        bpmnType:
          type: string
        icon:
          type: string
        color:
          type: string
        properties:
          type: object
        isActive:
          type: boolean
          default: true
        sortOrder:
          type: integer

    ProcessDefinition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
        key:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: integer
        bpmnXml:
          type: string
        status:
          type: string
          enum: [DRAFT, ACTIVE, DEPRECATED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          type: string

    CreateProcessDefinitionRequest:
      type: object
      required: [key, name, bpmnXml]
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
        bpmnXml:
          type: string
        status:
          type: string
          enum: [DRAFT, ACTIVE]
          default: DRAFT

    ProcessDefinitionPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ProcessDefinition'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    ProcessInstance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
        processDefinitionId:
          type: string
          format: uuid
        processDefinitionKey:
          type: string
        businessKey:
          type: string
        status:
          type: string
          enum: [ACTIVE, COMPLETED, TERMINATED, SUSPENDED]
        variables:
          type: object
        currentActivity:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        startedBy:
          type: string

    StartProcessRequest:
      type: object
      properties:
        businessKey:
          type: string
        variables:
          type: object
