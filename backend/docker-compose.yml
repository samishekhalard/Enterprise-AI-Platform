# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  valkey_data:

# ==========================================================================
# Networks
# ==========================================================================
networks:
  ems-network:
    driver: bridge
