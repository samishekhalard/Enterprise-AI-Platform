# Docker profile - uses container hostnames
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/license_db?sslmode=verify-full}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}

  data:
    redis:
      host: ${VALKEY_HOST:valkey}
      port: 6379

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka:8761/eureka}

logging:
  level:
    com.ems: INFO
