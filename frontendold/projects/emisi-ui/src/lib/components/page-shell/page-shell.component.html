<div class="emisi-page-shell" [class.emisi-page-shell--patterned]="patternedBackground">
  <header class="emisi-page-shell__header" [class.emisi-page-shell__header--empty]="!title && !subtitle">
    <div class="emisi-page-shell__heading">
      @if (title) {
        <h1 class="emisi-page-shell__title">{{ title }}</h1>
      }
      @if (subtitle) {
        <p class="emisi-page-shell__subtitle">{{ subtitle }}</p>
      }
    </div>
    <div class="emisi-page-shell__actions">
      <ng-content select="[emisiShellActions]" />
    </div>
  </header>

  <main class="emisi-page-shell__content">
    <ng-content />
  </main>

  <footer class="emisi-page-shell__footer">
    <ng-content select="[emisiShellFooter]" />
  </footer>
</div>
