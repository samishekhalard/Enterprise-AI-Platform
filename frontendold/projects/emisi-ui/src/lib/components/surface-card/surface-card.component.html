<article
  class="emisi-surface-card"
  [class.emisi-surface-card--flat]="variant === 'flat'"
  [class.emisi-surface-card--raised]="variant === 'raised'"
  [class.emisi-surface-card--inset]="variant === 'inset'"
  [class.emisi-surface-card--sm]="padding === 'sm'"
  [class.emisi-surface-card--md]="padding === 'md'"
  [class.emisi-surface-card--lg]="padding === 'lg'">
  <ng-content />
</article>
