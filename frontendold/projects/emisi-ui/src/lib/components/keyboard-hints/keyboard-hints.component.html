<section class="emisi-kbd-hints" [class.emisi-kbd-hints--compact]="compact" aria-label="Keyboard shortcut hints">
  <h3 class="emisi-kbd-hints__title">{{ title }}</h3>

  <ul class="emisi-kbd-hints__list">
    @for (hint of hints; track trackByHint($index, hint)) {
      <li class="emisi-kbd-hints__item">
        <span class="emisi-kbd-hints__keys" [attr.aria-label]="hint.ariaLabel || ('Shortcut: ' + hint.keys.join(' + '))">
          @for (key of hint.keys; track key; let keyLast = $last) {
            <kbd class="emisi-kbd-key">{{ key }}</kbd>
            @if (!keyLast) {
              <span class="emisi-kbd-hints__plus" aria-hidden="true">+</span>
            }
          }
        </span>
        <span class="emisi-kbd-hints__description">{{ hint.description }}</span>
      </li>
    }
  </ul>
</section>
